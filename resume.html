<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Resume | Meghna Santra</title>

    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header>

<nav class="navbar">

    <div class="menu-overlay"></div>

    <div class="navbar-inner">

        <div class="navbar-name">
            <a href="index.html">
                <strong>Meghna</strong> Santra
            </a>
        </div>

        <button class="menu-toggle" id="menuToggle" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div class="navbar-links" id="mobileMenu">

            <a href="index.html">Home</a>
            <a href="resume.html" class="active">Resume</a>
            <a href="projects.html">Projects</a>
            <a href="fun.html">Gallery</a>

        </div>

    </div>

</nav>
</header>

    <main>

        <section class="resume-section">

            <h1 class="section-title">Resume</h1>

            <p style="margin-bottom:30px;">
                You can view or download my latest CV below.
            </p>

            <div class="resume-container">

                <iframe
                    src="https://drive.google.com/file/d/1IZ8ktC-pZtB-pfLioRG0ulK-MZ-SX865/preview"
                    allow="autoplay">
                </iframe>

            </div>

        </section>

    </main>

    <footer class="footer">
        <p>© 2026 Meghna Santra. All rights reserved.</p>
    </footer>

<script>

const menuToggle = document.getElementById("menuToggle");
const mobileMenu = document.getElementById("mobileMenu");
const overlay = document.querySelector(".menu-overlay");

menuToggle.addEventListener("click", () => {

    mobileMenu.classList.toggle("open");
    overlay.classList.toggle("active");

    if (mobileMenu.classList.contains("open")) {

        menuToggle.innerHTML =
            '<i class="fa-solid fa-xmark"></i>';

    } else {

        menuToggle.innerHTML =
            '<i class="fa-solid fa-bars"></i>';
    }

});

overlay.addEventListener("click", () => {

    mobileMenu.classList.remove("open");
    overlay.classList.remove("active");

    menuToggle.innerHTML =
        '<i class="fa-solid fa-bars"></i>';

});

document.querySelectorAll(".navbar-links a").forEach(link => {

    link.addEventListener("click", () => {

        mobileMenu.classList.remove("open");
        overlay.classList.remove("active");

        menuToggle.innerHTML =
            '<i class="fa-solid fa-bars"></i>';

    });

});

</script>
</body>

</html>
