<div id="lightbox">
    <span class="close" onclick="closeLightbox()">×</span>

    <button class="nav prev" onclick="prevImage()">❮</button>

    <img id="lightbox-img" alt="Full view">

    <button class="nav next" onclick="nextImage()">❯</button>
</div>
    
<script>
let currentGallery = [];
let currentIndex = 0;

function openLightbox(img) {
    const gallery = img.closest(".gallery");   // find clicked gallery
    currentGallery = Array.from(gallery.querySelectorAll("img"));
    currentIndex = currentGallery.indexOf(img);

    document.getElementById("lightbox").style.display = "flex";
    showImage();
    document.body.style.overflow = "hidden";
}

function showImage() {
    document.getElementById("lightbox-img").src = currentGallery[currentIndex].src;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
    document.body.style.overflow = "auto";
}

function nextImage() {
    currentIndex = (currentIndex + 1) % currentGallery.length;
    showImage();
}

function prevImage() {
    currentIndex = (currentIndex - 1 + currentGallery.length) % currentGallery.length;
    showImage();
}

/* keyboard support */
document.addEventListener("keydown", function(e) {
    if (document.getElementById("lightbox").style.display === "flex") {
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "Escape") closeLightbox();
    }
});
</script>

<script>

const toggle = document.getElementById("theme-toggle");

const savedTheme =
    localStorage.getItem("theme") || "dark";

document.documentElement.setAttribute(
    "data-theme",
    savedTheme
);

function updateIcon() {

    toggle.innerHTML =
        document.documentElement.getAttribute("data-theme") === "dark"
            ? '<i class="fa-solid fa-sun"></i>'
            : '<i class="fa-solid fa-moon"></i>';
}

updateIcon();

toggle.addEventListener("click", () => {

    const current =
        document.documentElement.getAttribute("data-theme");

    const next =
        current === "dark"
            ? "light"
            : "dark";

    document.documentElement.setAttribute(
        "data-theme",
        next
    );

    localStorage.setItem(
        "theme",
        next
    );

    updateIcon();

});

</script>
<script>
const menuToggle = document.getElementById("menuToggle");
const mobileMenu = document.getElementById("mobileMenu");

menuToggle.addEventListener("click", () => {

    mobileMenu.classList.toggle("open");

    if (mobileMenu.classList.contains("open")) {
        menuToggle.innerHTML =
            '<i class="fa-solid fa-xmark"></i>';
    } else {
        menuToggle.innerHTML =
            '<i class="fa-solid fa-bars"></i>';
    }

});
</script>
